<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="css/user_dashboard.css">
</head>
<body>

<div class="container">

    <h1>🛒 Local Shop</h1>
  <div class="hero">
  <h1>🛒 Welcome to Local Shop</h1>
  <p>Buy daily essentials at best price</p>
  </div>
   <h2>🛍️ Products </h2>
    <!-- PRODUCTS -->
    <div id="product-list"></div>

    <p class="info-text">Click on product to add to cart</p>

    <!-- CART -->
    <h2>Your Cart</h2>
    <div id="cart"></div>

    <!-- ORDER BUTTON -->
    <div style="text-align:center;">
        <button onclick="toggleOrderForm()">📝 Place Order</button>
    </div>

    <!-- ORDER FORM (HIDDEN) -->
    <div id="order-form" class="order-box" style="display:none;">
        <h2>Enter Details</h2>

        <input type="text" id="name" placeholder="Enter Name"><br>
        <input type="text" id="phone" placeholder="Enter Phone"><br>
        <input type="text" id="address" placeholder="Enter Address"><br>

        <button onclick="submitOrder()">Submit Order</button>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Local Shop | Built by You 🚀</p>
</footer>

<script src="js/product.js"></script>

</body>
</html>
